name: test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.*'
      - name: Run tests
        run: go test ./... -timeout 60s
